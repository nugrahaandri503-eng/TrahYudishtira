<!DOCTYPE html>
<html lang="id">
<head>
    <meta name="google-site-verification" content="6RWs-Dtnf9y5kzs5Oh1kPAHKskclHq_HFjiBzQVdzzU" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Latihan Mengetik - Anti Crash Edition</title>
    <style>
        body {
            background-color: #121212; color: #ffffff;
            font-family: 'Courier New', Courier, monospace; 
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; overflow: hidden; 
        }

        .container {
            background: #1e1e1e; padding: 30px; border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.9); width: 95%; max-width: 850px; 
            box-sizing: border-box; max-height: 100vh; overflow-y: auto;
        }

        .menu-header { text-align: center; margin-bottom: 25px; }
        .menu-header h1 { color: #4facfe; font-size: 2rem; margin-bottom: 5px; margin-top: 0; }
        .menu-header p { color: #aaa; font-size: 0.9rem; }
        
        .btn-grid { display: flex; flex-direction: column; gap: 10px; }

        .menu-btn {
            background: #2a2a2a; border: 2px solid #4facfe; color: white;
            padding: 15px; border-radius: 10px; font-size: 1.1rem; text-align: left;
            cursor: pointer; transition: 0.3s; display: flex; flex-direction: column;
        }

        .menu-btn:hover { background: rgba(79, 172, 254, 0.1); transform: translateY(-3px); box-shadow: 0 5px 15px rgba(79, 172, 254, 0.3); }
        .menu-btn strong { font-size: 1.1rem; color: #00f2fe; margin-bottom: 5px; }
        .menu-btn span { font-size: 0.85rem; color: #aaa; font-family: 'Segoe UI', Tahoma, sans-serif; line-height: 1.4; }

        .theme-btn { border-color: #2ed573; }
        .theme-btn strong { color: #2ed573; }
        .theme-btn:hover { background: rgba(46, 213, 115, 0.1); box-shadow: 0 5px 15px rgba(46, 213, 115, 0.3); }

        .stats { display: flex; justify-content: space-between; align-items: center; font-size: 1.2rem; color: #aaaaaa; margin-bottom: 15px; font-weight: bold; }
        #time-display-text { color: #ff4757; font-size: 1.5rem; }

        .top-controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; justify-content: flex-end;}

        .control-btn {
            background: #333; color: white; border: none; padding: 8px 12px;
            border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s;
            display: flex; justify-content: center; align-items: center; font-size: 1rem;
        }
        .control-btn:hover { background: #555; }
        
        #finish-btn { background: #ff4757; display: none; }
        #finish-btn:hover { background: #ff6b81; }
        
        #mid-restart-btn { padding: 8px; border-radius: 50%; width: 38px; height: 38px; }
        #mid-restart-btn:hover { background: #4facfe; transform: rotate(180deg); }

        #word-display {
            font-size: 1.5rem; line-height: 1.5; color: #555555; 
            display: flex; flex-wrap: wrap; align-content: flex-start; gap: 8px 12px;
            height: 110px; overflow-y: hidden; margin-bottom: 20px; user-select: none;
            padding: 5px; scroll-behavior: smooth; 
        }

        .word { display: inline-flex; transition: 0.1s; border-bottom: 3px solid transparent; }
        .word.active { border-bottom: 3px solid #4facfe; text-shadow: 0 0 8px rgba(255,255,255,0.3); }
        .letter { transition: 0.1s; }
        .letter.correct { color: #2ed573; } 
        .letter.incorrect { color: #ff4757; background-color: rgba(255, 71, 87, 0.2); border-radius: 3px; }

        input {
            width: 100%; padding: 15px; font-size: 1.2rem; text-align: center;
            border: 2px solid #333; border-radius: 8px; background: #2a2a2a; color: #ffffff; 
            outline: none; transition: 0.3s; box-sizing: border-box;
        }
        input:focus { border-color: #4facfe; }
        .hidden { display: none !important; }

        .result-box { text-align: center; }
        .result-box h2 { font-size: 2rem; color: #ff4757; margin-top: 0; }
        .wpm-score { font-size: 3.5rem; font-weight: bold; color: #4facfe; margin: 5px 0; }
        
        .stats-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
            background: #2a2a2a; padding: 15px; border-radius: 10px; margin-bottom: 15px; text-align: left;
        }
        .stats-grid div { font-size: 0.9rem; color: #ccc; display: flex; flex-direction: column; border-bottom: 1px solid #444; padding-bottom: 5px; }
        .stats-grid span { font-weight: bold; font-size: 1.1rem; margin-top: 5px; }

        .wrong-words-box {
            background: rgba(255, 71, 87, 0.1); border: 1px solid #ff4757; border-radius: 8px;
            padding: 12px; margin-bottom: 20px; text-align: left; max-height: 80px; overflow-y: auto; font-size: 0.9rem; color: #ffaaab;
        }
        .wrong-words-title { color: #ff4757; font-weight: bold; margin-bottom: 5px; display: block; }

        .text-green { color: #2ed573; } .text-red { color: #ff4757; } .text-blue { color: #4facfe; } 
        .text-white { color: #ffffff; } .text-yellow { color: #f1c40f; }
        
        .btn-group { display: flex; flex-direction: column; gap: 10px; }
        
        button.main-btn {
            padding: 12px; font-size: 1.1rem; background: linear-gradient(to right, #4facfe, #00f2fe);
            color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; width: 100%;
        }
        button.main-btn:hover { box-shadow: 0 5px 15px rgba(79, 172, 254, 0.4); }
        button.secondary-btn { background: #333; color: white; }

        @media (max-width: 600px) {
            .container { padding: 20px 15px; }
            .menu-btn strong { font-size: 1rem; }
            #word-display { font-size: 1.2rem; height: 95px; }
            input { font-size: 1rem; padding: 12px; }
            .stats { font-size: 1rem; align-items: flex-start; flex-direction: column; gap: 10px;}
            .top-controls { width: 100%; justify-content: space-between; }
            #time-display-text { font-size: 1.2rem; }
            .wpm-score { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <div class="container" id="menu-container">
        <div class="menu-header">
            <h1>Typing Master Pro</h1>
            <p>Pilih mode latihan (Support PC & Mobile)</p>
        </div>
        <div class="btn-grid">
            <button class="menu-btn" onclick="selectMode(1)">
                <strong>Mode 1: Kasual (60s)</strong>
                <span>Fokus kecepatan. Menggunakan kata hubung & kata kerja kasual sehari-hari.</span>
            </button>
            <button class="menu-btn" onclick="selectMode(2)">
                <strong>Mode 2: Kosakata Baku KTI (60s)</strong>
                <span>Melatih ketelitian dengan bank kata baku PUEBI untuk tes UTBK & penulisan KTI.</span>
            </button>
            <button class="menu-btn" onclick="selectMode(3)">
                <strong>Mode 3: Kalimat KTI (60s)</strong>
                <span>Menyusun rentetan kalimat Karya Tulis Ilmiah dalam waktu terbatas.</span>
            </button>
            <button class="menu-btn" onclick="selectMode(4)">
                <strong>Mode 4: Simulasi KTI (Endless)</strong>
                <span>Fokus penuh menyusun kalimat KTI. Tekan tombol Selesai untuk mengakhiri.</span>
            </button>
        </div>
    </div>

    <div class="container hidden" id="theme-container">
        <div class="menu-header">
            <h1>Pilih Tema Referensi KTI</h1>
        </div>
        <div class="btn-grid">
            <button class="menu-btn theme-btn" onclick="selectTheme('perkapalan')">
                <strong>Teknik Perkapalan</strong>
                <span>Hidrostatika, lines plan, CFD, stabilitas laut, dan mekanika fluida.</span>
            </button>
            <button class="menu-btn theme-btn" onclick="selectTheme('komunikasi')">
                <strong>Ilmu Komunikasi</strong>
                <span>Analisis wacana, literasi digital, public relations, dan semiotika media.</span>
            </button>
            <button class="main-btn secondary-btn" style="margin-top: 10px;" onclick="returnToMenu()">Kembali ke Menu</button>
        </div>
    </div>

    <div class="container hidden" id="game-container">
        <div class="stats">
            <div id="time-display-wrapper"><span id="time-display-text">60</span></div>
            <div class="top-controls">
                <button class="control-btn" id="back-to-menu-btn" title="Kembali ke Menu">⬅️ Menu</button>
                <button class="control-btn" id="finish-btn" title="Akhiri Latihan">🛑 Selesai</button>
                <button class="control-btn" id="mid-restart-btn" title="Ulangi Latihan Ini">🔄</button>
            </div>
        </div>
        <div id="word-display"></div>
        <input type="text" id="word-input" placeholder="Mulai ketik..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" inputmode="text">
    </div>

    <div class="container hidden" id="result-container">
        <div class="result-box">
            <h2 id="result-title">Selesai!</h2>
            <p class="wpm-score"><span id="wpm">0</span> KPM</p>
            
            <div class="stats-grid">
                <div>Akurasi <span class="text-yellow" id="stat-accuracy">0%</span></div>
                <div>Waktu <span class="text-white" id="stat-time-spent">0s</span></div>
                <div>Total Huruf <span class="text-blue" id="stat-total-letters">0</span></div>
                <div>Huruf Benar <span class="text-green" id="stat-correct-letters">0</span></div>
                <div>Kata Benar <span class="text-white" id="stat-words">0</span></div>
                <div>Huruf Salah <span class="text-red" id="stat-incorrect-letters">0</span></div>
            </div>

            <div class="wrong-words-box">
                <span class="wrong-words-title">Kata Salah / Terlewat:</span>
                <span id="wrong-words-list">-</span>
            </div>

            <div class="btn-group">
                <button class="main-btn" id="restart-btn">Ulangi Latihan</button>
                <button class="main-btn secondary-btn" id="back-menu-btn">Menu Utama</button>
            </div>
        </div>
    </div>

    <script>
        const dailyWords = ["yang", "dan", "di", "ke", "dari", "ini", "itu", "untuk", "pada", "dengan", "adalah", "sebagai", "tidak", "bisa", "akan", "tapi", "karena", "kalau", "sudah", "lagi", "lebih", "sangat", "paling", "hanya", "juga", "atau", "saat", "lalu", "biar", "terus", "sambil", "memang", "cepat", "lambat", "baik", "buruk", "baru", "lama", "jauh", "dekat", "mudah", "susah", "banyak", "sedikit", "besar", "kecil", "bagus", "keren", "santai", "sibuk", "makan", "minum", "tidur", "pergi", "pulang", "jalan", "lari", "bikin", "buat", "pakai", "ambil", "kasih", "bawa", "cari", "dapat", "coba", "mulai", "selesai", "paham", "ngerti", "suka", "benci", "mau", "ingin", "jangan", "mari", "ayo", "tolong", "maaf", "terima", "sama", "beda", "benar", "salah", "mungkin", "pasti", "selalu", "kadang", "belum", "sekarang", "nanti", "besok", "kemarin", "hari", "malam", "pagi", "sore", "iya", "enggak", "oke", "sip", "dong", "deh", "nih", "tuh", "kan", "kok", "sih", "aja", "banget", "lumayan", "biasa", "luar", "dalam", "atas", "bawah", "depan", "kiri", "kanan", "sini", "situ", "sana", "mana", "apa", "siapa", "mengapa", "kenapa", "gimana", "kapan", "berapa"];

        const utbkWords = [
            "andal", "antre", "asas", "autisme", "balsam", "batalion", "baterai", "bolpoin", "bujur", 
            "cenderamata", "cengkeram", "detail", "diagnosis", "diperbarui", "ekstrem", "elite", "embus", 
            "fondasi", "frekuensi", "genius", "gua", "gubuk", "haktul", "hafal", "hierarki", "higienis", 
            "imbau", "indra", "isap", "istri", "jadwal", "jenazah", "jenderal", "kacamata", "karier", 
            "kategori", "khatulistiwa", "khawatir", "kiai", "kualitas", "kuitansi", "legenda", "lembap", 
            "lubang", "maaf", "makhluk", "manajemen", "mangkuk", "mantra", "massal", "memercayai", 
            "memesona", "memopulerkan", "mengubah", "menyukseskan", "miliar", "misi", "mosaik", 
            "napas", "narasumber", "nasihat", "objek", "omzet", "paham", "pascapanen", "peka", 
            "pembaruan", "penasihat", "pertanggungjawaban", "piawai", "praktik", "provinsi", "putra", 
            "ramai", "rapor", "relaksasi", "respons", "risiko", "roboh", "saksama", "samudra", 
            "sanksi", "saraf", "sekadar", "sekretaris", "silakan", "sistem", "sportif", "standardisasi", 
            "subjek", "survei", "sutradara", "tampak", "tauladan", "telantar", "terampil", "ubah", 
            "utang", "wujud", "zaman", "zamrud", "kedaluwarsa", "mencolok", "memunafikkan"
        ];

        let ktiPerkapalan = [];
        let ktiKomunikasi = [];

        fetch('kti-data.json')
            .then(response => response.json())
            .then(data => {
                if(data.perkapalan) ktiPerkapalan = data.perkapalan;
                if(data.komunikasi) ktiKomunikasi = data.komunikasi;
                console.log("Data referensi KTI berhasil ditarik!");
            })
            .catch(error => console.error("Gagal mengambil data JSON:", error));

        function shuffleArray(array) {
            let shuffled = array.slice(); 
            let currentIndex = shuffled.length, randomIndex;
            while (currentIndex != 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [shuffled[currentIndex], shuffled[randomIndex]] = [shuffled[randomIndex], shuffled[currentIndex]];
            }
            return shuffled;
        }

        let currentMode = 1; 
        let currentTheme = 'perkapalan'; 
        let time = 60;
        let elapsedSeconds = 0; 
        let isPlaying = false;
        let timerInterval;
        let currentWordIndex = 0;
        let wordEls = []; 

        const menuContainer = document.getElementById('menu-container');
        const themeContainer = document.getElementById('theme-container');
        const gameContainer = document.getElementById('game-container');
        const resultContainer = document.getElementById('result-container');
        const wordDisplay = document.getElementById('word-display');
        const wordInput = document.getElementById('word-input');
        const timeDisplayWrapper = document.getElementById('time-display-wrapper');
        const finishBtn = document.getElementById('finish-btn');

        window.history.pushState({ page: "menu" }, "", "");
        window.addEventListener('popstate', function(event) {
            if (!menuContainer.classList.contains('hidden')) {
                window.history.pushState({ page: "menu" }, "", "");
            } else {
                returnToMenu();
                window.history.pushState({ page: "menu" }, "", "");
            }
        });

        function formatTimeLong(totalSeconds) {
            let m = Math.floor(totalSeconds / 60);
            let s = totalSeconds % 60;
            if(m > 0) return `${m} Menit ${s} Detik`;
            return `${s} Detik`;
        }

        function selectMode(mode) {
            currentMode = mode;
            menuContainer.classList.add('hidden');
            if (mode === 1 || mode === 2) {
                gameContainer.classList.remove('hidden');
                resetGameSetup();
            } else {
                themeContainer.classList.remove('hidden');
            }
        }

        function selectTheme(theme) {
            currentTheme = theme;
            themeContainer.classList.add('hidden');
            gameContainer.classList.remove('hidden');
            resetGameSetup();
        }

        function returnToMenu() {
            clearInterval(timerInterval);
            isPlaying = false;
            themeContainer.classList.add('hidden');
            gameContainer.classList.add('hidden');
            resultContainer.classList.add('hidden');
            menuContainer.classList.remove('hidden');
        }

        function restartCurrentSession() {
            if(currentMode === 1 || currentMode === 2) selectMode(currentMode); 
            else selectTheme(currentTheme); 
        }

        function resetGameSetup() {
            wordDisplay.innerHTML = '';
            wordInput.value = '';
            wordInput.disabled = false;
            currentWordIndex = 0;
            wordDisplay.scrollTop = 0;
            isPlaying = false;
            elapsedSeconds = 0;
            clearInterval(timerInterval);

            if (currentMode === 4) {
                timeDisplayWrapper.innerHTML = `<span style="font-size:1.1rem; color:#aaa;">Tak Terbatas</span>`;
                finishBtn.style.display = 'flex';
            } else {
                time = 60;
                timeDisplayWrapper.innerHTML = `Waktu: <span id="time-display-text">60</span>s`;
                finishBtn.style.display = 'none';
            }

            let textArray = [];

            if (currentMode === 1) {
                let randomizedWords = shuffleArray(dailyWords);
                textArray = randomizedWords.slice(0, 80);
            } else if (currentMode === 2) {
                let randomizedWords = shuffleArray(utbkWords);
                textArray = randomizedWords.slice(0, 80);
            } else {
                let sentenceSource = (currentTheme === 'perkapalan') ? ktiPerkapalan : ktiKomunikasi;
                
                // JARING PENGAMAN 1: Mencegah Layar Nge-Freeze karena data kosong
                if (sentenceSource.length === 0) {
                    alert("Data referensi KTI belum termuat. Silakan klik OK dan coba pilih mode ini lagi!");
                    returnToMenu();
                    return; 
                }

                let randomizedSentences = shuffleArray(sentenceSource);
                let neededSentences = (currentMode === 4) ? 30 : 10; 
                
                // JARING PENGAMAN 2: Anti Infinite Loop
                let loopCount = 0;
                while(randomizedSentences.length < neededSentences && loopCount < 50) {
                    randomizedSentences = randomizedSentences.concat(shuffleArray(sentenceSource));
                    loopCount++;
                }
                textArray = randomizedSentences.slice(0, neededSentences).join(" ").trim().split(" ");
            }

            textArray.forEach(word => {
                const wordSpan = document.createElement('span');
                wordSpan.classList.add('word');
                word.split('').forEach(char => {
                    const charSpan = document.createElement('span');
                    charSpan.classList.add('letter');
                    charSpan.innerText = char;
                    wordSpan.appendChild(charSpan);
                });
                wordDisplay.appendChild(wordSpan);
            });

            wordEls = document.querySelectorAll('.word');
            if(wordEls.length > 0) wordEls[0].classList.add('active'); 
            wordInput.focus();
        }

        function startGame() {
            if (!isPlaying) {
                isPlaying = true;
                timerInterval = setInterval(updateTime, 1000);
            }
        }

        function processNextWord(typedText) {
            const currentWordEl = wordEls[currentWordIndex];
            const letterEls = currentWordEl.querySelectorAll('.letter');
            
            letterEls.forEach((letterEl, index) => {
                if (index >= typedText.length) letterEl.classList.add('incorrect');
            });

            currentWordEl.classList.remove('active');
            currentWordIndex++;

            if (currentWordIndex >= wordEls.length) {
                endGame();
                return;
            }

            const nextWordEl = wordEls[currentWordIndex];
            nextWordEl.classList.add('active');
            wordInput.value = ''; 
            
            if (nextWordEl.offsetTop > currentWordEl.offsetTop) {
                wordDisplay.scrollTop += (nextWordEl.offsetTop - currentWordEl.offsetTop);
            }
        }

        wordInput.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault(); 
                let typedText = wordInput.value.trim();
                if (typedText.length === 0) return; 
                if (!isPlaying) startGame();
                processNextWord(typedText);
            }
            if (e.key === 'Escape' && isPlaying && currentMode === 4) {
                e.preventDefault(); endGame();
            }
        });

        wordInput.addEventListener('input', (e) => {
            if (!isPlaying && wordInput.value.length > 0) startGame();
            
            if (wordInput.value.endsWith(' ')) {
                let typedText = wordInput.value.trim();
                if (typedText.length > 0) {
                    processNextWord(typedText);
                } else {
                    wordInput.value = ''; 
                }
                return; 
            }

            const currentWordEl = wordEls[currentWordIndex];
            if (!currentWordEl) return;
            const letterEls = currentWordEl.querySelectorAll('.letter');
            const typedArray = wordInput.value.split('');

            letterEls.forEach((letterEl, index) => {
                if (typedArray[index] == null) {
                    letterEl.classList.remove('correct', 'incorrect');
                } else if (typedArray[index] === letterEl.innerText) {
                    letterEl.classList.add('correct');
                    letterEl.classList.remove('incorrect');
                } else {
                    letterEl.classList.add('incorrect');
                    letterEl.classList.remove('correct');
                }
            });
        });

        function updateTime() {
            elapsedSeconds++;
            if (currentMode !== 4) {
                time--;
                document.getElementById('time-display-text').innerText = time;
                if (time <= 0) endGame();
            }
        }

        function endGame() {
            isPlaying = false;
            clearInterval(timerInterval);
            wordInput.disabled = true;

            const totalCorrectLetters = document.querySelectorAll('.letter.correct').length;
            const totalIncorrectLetters = document.querySelectorAll('.letter.incorrect').length;
            const totalTypedLetters = totalCorrectLetters + totalIncorrectLetters;
            
            let correctWordsCount = 0;
            let wrongWordsArray = [];

            for (let i = 0; i <= currentWordIndex; i++) {
                if (i >= wordEls.length) break;
                
                const wordEl = wordEls[i];
                const letterEls = wordEl.querySelectorAll('.letter');
                const correctLettersInWord = wordEl.querySelectorAll('.letter.correct').length;
                const hasIncorrect = wordEl.querySelector('.letter.incorrect') !== null;
                
                if (i === currentWordIndex && wordInput.value.trim().length === 0) continue; 

                if (hasIncorrect || correctLettersInWord < letterEls.length) {
                    let wrongWordText = "";
                    letterEls.forEach(l => wrongWordText += l.innerText);
                    wrongWordsArray.push(wrongWordText);
                } else {
                    correctWordsCount++;
                }
            }

            let accuracy = totalTypedLetters > 0 ? Math.round((totalCorrectLetters / totalTypedLetters) * 100) : 0;
            let timeInMinutes = elapsedSeconds / 60;
            if (timeInMinutes === 0) timeInMinutes = 1; 
            let kpm = Math.round((totalCorrectLetters / 5) / timeInMinutes);

            document.getElementById('result-title').innerText = (currentMode === 4) ? "Sesi Selesai!" : "Waktu Habis!";
            document.getElementById('wpm').innerText = kpm;
            document.getElementById('stat-accuracy').innerText = accuracy + "%";
            document.getElementById('stat-words').innerText = correctWordsCount;
            document.getElementById('stat-correct-letters').innerText = totalCorrectLetters;
            document.getElementById('stat-incorrect-letters').innerText = totalIncorrectLetters;
            document.getElementById('stat-total-letters').innerText = totalTypedLetters;
            document.getElementById('stat-time-spent').innerText = formatTimeLong(elapsedSeconds);

            const wrongWordsListEl = document.getElementById('wrong-words-list');
            if (wrongWordsArray.length > 0) {
                let uniqueWrongWords = [...new Set(wrongWordsArray)];
                wrongWordsListEl.innerText = uniqueWrongWords.join(", ");
            } else {
                wrongWordsListEl.innerText = "Sempurna! Bersih tanpa salah ketik.";
            }

            gameContainer.classList.add('hidden');
            resultContainer.classList.remove('hidden');
        }

        document.getElementById('back-to-menu-btn').addEventListener('click', returnToMenu);
        document.getElementById('back-menu-btn').addEventListener('click', returnToMenu);
        document.getElementById('mid-restart-btn').addEventListener('click', restartCurrentSession);
        document.getElementById('finish-btn').addEventListener('click', endGame);
        document.getElementById('restart-btn').addEventListener('click', restartCurrentSession);

    </script>
</body>
</html>
