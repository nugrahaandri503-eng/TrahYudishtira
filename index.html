<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Typing Master - Classic Training</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');

        /* === CSS VARIABLES & THEMES === */
        :root { --bg-main: #0f172a; --bg-dot: #334155; --container-bg: rgba(30, 41, 59, 0.7); --primary: #38bdf8; --primary-grad-1: #38bdf8; --primary-grad-2: #818cf8; --primary-glow: rgba(56, 189, 248, 0.25); --primary-trans: rgba(56, 189, 248, 0.1); --correct: #34d399; --incorrect: #f87171; --incorrect-bg: rgba(248, 113, 113, 0.15); --extra: #f43f5e; --extra-bg: rgba(244, 63, 94, 0.2); --text-main: #f8fafc; --text-muted: #94a3b8; --panel-bg: rgba(0, 0, 0, 0.2); --panel-bg-focus: rgba(0, 0, 0, 0.4); --border-light: rgba(255, 255, 255, 0.05); --border-strong: rgba(255, 255, 255, 0.1); --btn-text: #000; --gold-text: #fbbf24; --gold-bg: rgba(251, 191, 36, 0.15); --gold-border: rgba(251, 191, 36, 0.4); }
        [data-theme="cyberpunk"] { --bg-main: #09090b; --bg-dot: #500724; --container-bg: rgba(9, 9, 11, 0.8); --primary: #f472b6; --primary-grad-1: #f472b6; --primary-grad-2: #2dd4bf; --primary-glow: rgba(244, 114, 182, 0.3); --primary-trans: rgba(244, 114, 182, 0.1); --correct: #2dd4bf; --incorrect: #fb7185; --incorrect-bg: rgba(251, 113, 133, 0.15); --extra: #e11d48; --extra-bg: rgba(225, 29, 72, 0.25); --text-main: #fff; --text-muted: #a1a1aa; --panel-bg: rgba(0, 0, 0, 0.4); --panel-bg-focus: rgba(0, 0, 0, 0.6); --border-light: rgba(244, 114, 182, 0.1); --border-strong: rgba(45, 212, 191, 0.2); }
        [data-theme="ocean"] { --bg-main: #082f49; --bg-dot: #0c4a6e; --container-bg: rgba(8, 47, 73, 0.75); --primary: #38bdf8; --primary-grad-1: #38bdf8; --primary-grad-2: #34d399; --primary-glow: rgba(56, 189, 248, 0.3); --primary-trans: rgba(56, 189, 248, 0.1); --correct: #34d399; --incorrect: #fbbf24; --incorrect-bg: rgba(251, 191, 36, 0.15); --extra: #f59e0b; --extra-bg: rgba(245, 158, 11, 0.25); --text-main: #f0f9ff; --text-muted: #7dd3fc; --panel-bg: rgba(0, 0, 0, 0.25); --panel-bg-focus: rgba(0, 0, 0, 0.45); --border-light: rgba(56, 189, 248, 0.1); --border-strong: rgba(56, 189, 248, 0.2); }
        [data-theme="matcha"] { --bg-main: #1c1917; --bg-dot: #292524; --container-bg: rgba(28, 25, 23, 0.85); --primary: #a3e635; --primary-grad-1: #a3e635; --primary-grad-2: #4ade80; --primary-glow: rgba(163, 230, 53, 0.25); --primary-trans: rgba(163, 230, 53, 0.1); --correct: #4ade80; --incorrect: #f87171; --incorrect-bg: rgba(248, 113, 113, 0.15); --extra: #ef4444; --extra-bg: rgba(239, 68, 68, 0.2); --text-main: #fafaf9; --text-muted: #a8a29e; --panel-bg: rgba(0, 0, 0, 0.3); --panel-bg-focus: rgba(0, 0, 0, 0.5); --border-light: rgba(163, 230, 53, 0.05); --border-strong: rgba(163, 230, 53, 0.1); }
        [data-theme="hacker"] { --bg-main: #000000; --bg-dot: #002200; --container-bg: rgba(0, 15, 0, 0.9); --primary: #22c55e; --primary-grad-1: #22c55e; --primary-grad-2: #16a34a; --primary-glow: rgba(34, 197, 94, 0.35); --primary-trans: rgba(34, 197, 94, 0.15); --correct: #86efac; --incorrect: #ef4444; --incorrect-bg: rgba(239, 68, 68, 0.25); --extra: #dc2626; --extra-bg: rgba(220, 38, 38, 0.3); --text-main: #4ade80; --text-muted: #16a34a; --panel-bg: rgba(0, 20, 0, 0.5); --panel-bg-focus: rgba(0, 40, 0, 0.7); --border-light: rgba(34, 197, 94, 0.1); --border-strong: rgba(34, 197, 94, 0.2); }
        [data-theme="kawaii"] { --bg-main: #fdf2f8; --bg-dot: #fbcfe8; --container-bg: rgba(255, 255, 255, 0.85); --primary: #db2777; --primary-grad-1: #f472b6; --primary-grad-2: #db2777; --primary-glow: rgba(219, 39, 119, 0.3); --primary-trans: rgba(219, 39, 119, 0.1); --correct: #059669; --incorrect: #e11d48; --incorrect-bg: rgba(225, 29, 72, 0.15); --extra: #9f1239; --extra-bg: rgba(159, 18, 57, 0.2); --text-main: #4a044e; --text-muted: #86198f; --panel-bg: rgba(251, 207, 232, 0.5); --panel-bg-focus: rgba(255, 255, 255, 0.8); --border-light: rgba(219, 39, 119, 0.15); --border-strong: rgba(219, 39, 119, 0.3); --btn-text: #ffffff; --gold-text: #d97706; --gold-bg: rgba(245, 158, 11, 0.15); --gold-border: rgba(245, 158, 11, 0.4); }

        ::-webkit-scrollbar { display: none; } * { -ms-overflow-style: none; scrollbar-width: none; }
        body { background-color: var(--bg-main); background-image: radial-gradient(var(--bg-dot) 1px, transparent 1px); background-size: 24px 24px; color: var(--text-main); font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow: hidden; transition: background-color 0.4s ease, background-image 0.4s ease; }
        .container { background: var(--container-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid var(--border-light); padding: 40px 35px; border-radius: 24px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); width: 95%; max-width: 850px; box-sizing: border-box; max-height: 100vh; overflow-y: auto; transition: all 0.4s ease; position: relative; }
        
        .menu-header { text-align: center; margin-bottom: 25px; }
        .menu-header h1 { background: linear-gradient(to right, var(--primary-grad-1), var(--primary-grad-2)); -webkit-background-clip: text; color: transparent; font-size: 2.5rem; margin-bottom: 5px; margin-top: 0; font-weight: 800; letter-spacing: -1px; }
        .menu-header p { color: var(--text-muted); font-size: 0.95rem; font-weight: 400; margin-bottom: 15px;}
        .best-all-time { background: var(--gold-bg); border: 1px solid var(--gold-border); color: var(--gold-text); padding: 8px 16px; border-radius: 20px; display: inline-block; font-weight: 800; font-size: 0.95rem; box-shadow: 0 0 15px rgba(251, 191, 36, 0.1); }
        .settings-panel { display: flex; justify-content: center; gap: 15px; margin-bottom: 25px; background: var(--panel-bg); padding: 12px; border-radius: 16px; flex-wrap: wrap; }
        .setting-group { display: flex; align-items: center; gap: 8px; font-size: 0.9rem; font-weight: 600; color: var(--text-muted);}
        .setting-group select { background: var(--panel-bg); border: 1px solid var(--border-strong); color: var(--text-main); padding: 8px 12px; border-radius: 10px; font-family: 'Inter', sans-serif; font-weight: 600; outline: none; cursor: pointer; }
        .setting-group select:hover { border-color: var(--primary); background: var(--primary-trans); }
        .setting-group select option { background: var(--bg-main); color: var(--text-main); }

        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .menu-btn { background: var(--panel-bg); border: 1px solid var(--border-light); color: var(--text-main); padding: 20px; border-radius: 16px; font-size: 1.1rem; text-align: left; cursor: pointer; transition: all 0.3s; display: flex; flex-direction: column; justify-content: space-between; }
        .menu-btn:hover { background: var(--primary-trans); border-color: var(--primary); transform: translateY(-4px); box-shadow: 0 10px 25px -5px var(--primary-glow); }
        .menu-btn strong { font-size: 1.15rem; color: var(--primary); margin-bottom: 6px; font-weight: 600; }
        .menu-btn span { font-size: 0.85rem; color: var(--text-muted); line-height: 1.5; }
        .mode-best-badge { display: inline-flex; align-items: center; margin-top: 10px; font-size: 0.75rem; color: var(--gold-text); background: var(--panel-bg); padding: 5px 10px; border-radius: 8px; border: 1px solid var(--gold-border); font-weight: 600; width: fit-content; }
        
        .switch-app-btn { grid-column: 1 / -1; background: var(--correct); color: #000; text-align: center; justify-content: center; align-items: center; font-weight: 800; border: none; padding: 15px; font-size: 1.1rem; box-shadow: 0 0 15px rgba(52, 211, 153, 0.4);}
        .switch-app-btn:hover { background: #10b981; color: #fff; transform: scale(1.02); }

        .stats { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid var(--border-strong); }
        #time-display-wrapper { font-weight: 600; color: var(--text-muted); font-size: 1.1rem; }
        #time-display-text { color: var(--extra); font-size: 1.8rem; font-weight: 800; text-shadow: 0 0 15px var(--extra-bg); }
        .top-controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; justify-content: flex-end;}
        .control-btn { background: var(--panel-bg); color: var(--text-main); border: 1px solid var(--border-strong); padding: 10px 16px; border-radius: 12px; cursor: pointer; font-weight: 600; transition: all 0.2s; display: flex; justify-content: center; align-items: center; font-size: 0.95rem;}
        .control-btn:hover { background: var(--primary-trans); transform: scale(1.05); }
        #finish-btn { border-color: var(--extra-bg); color: var(--extra); }
        #finish-btn:hover { background: var(--extra); color: white; box-shadow: 0 0 15px var(--extra-bg); }

        #word-display { font-family: 'Consolas', monospace; font-size: 1.6rem; line-height: 1.6; color: var(--text-muted); display: flex; flex-wrap: wrap; align-content: flex-start; gap: 8px 14px; height: 125px; overflow-y: hidden; margin-bottom: 25px; user-select: none; padding: 10px; scroll-behavior: smooth; font-weight: 600; }
        .word { display: inline-flex; transition: 0.1s; border-bottom: 3px solid transparent; border-radius: 2px;}
        .word.active { border-bottom: 3px solid var(--primary); color: var(--text-main); }
        .letter { transition: 0.1s; }
        .letter.correct { color: var(--correct); text-shadow: 0 0 8px rgba(52, 211, 153, 0.2); } 
        .letter.incorrect { color: var(--incorrect); background-color: var(--incorrect-bg); border-radius: 4px; }
        .letter.extra { color: var(--extra); font-weight: 800; background-color: var(--extra-bg); }

        input.classic-input { width: 100%; padding: 18px 20px; font-size: 1.3rem; text-align: center; border: 2px solid var(--border-strong); border-radius: 16px; background: var(--panel-bg); color: var(--primary); outline: none; transition: all 0.3s; font-family: 'Inter', sans-serif; font-weight: 600; }
        input.classic-input:focus { border-color: var(--primary); background: var(--panel-bg-focus); box-shadow: 0 0 20px var(--primary-glow); }
        input.classic-input::placeholder { color: var(--text-muted); font-weight: 400; opacity: 0.6;}
        
        .hidden { display: none !important; }
        .result-box { text-align: center; }
        .result-box h2 { font-size: 2.2rem; color: var(--text-main); margin-top: 0; letter-spacing: -1px; }
        .wpm-score { font-size: 4.5rem; font-weight: 800; color: var(--primary); margin: 10px 0; text-shadow: 0 0 30px var(--primary-glow); line-height: 1; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; background: var(--panel-bg); padding: 20px; border-radius: 16px; margin-bottom: 20px; text-align: left; border: 1px solid var(--border-light); }
        .stats-grid div { font-size: 0.9rem; color: var(--text-muted); display: flex; flex-direction: column; }
        .stats-grid span { font-weight: 800; font-size: 1.3rem; margin-top: 4px; }
        .wrong-words-box { background: var(--extra-bg); border: 1px solid rgba(244, 63, 94, 0.2); border-radius: 12px; padding: 15px; margin-bottom: 25px; text-align: left; max-height: 100px; overflow-y: auto; font-size: 0.95rem; color: var(--extra); }
        .wrong-words-title { color: var(--extra); font-weight: 600; margin-bottom: 8px; display: block; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px;}
        .text-green { color: var(--correct); } .text-red { color: var(--incorrect); } .text-blue { color: var(--primary); } .text-white { color: var(--text-main); } .text-yellow { color: var(--gold-text); }
        .btn-group { display: flex; flex-direction: column; gap: 12px; }
        button.main-btn { padding: 16px; font-size: 1.1rem; background: linear-gradient(135deg, var(--primary-grad-1), var(--primary-grad-2)); color: var(--btn-text); border: none; border-radius: 12px; cursor: pointer; font-weight: 800; width: 100%; box-shadow: 0 10px 20px -10px var(--primary-glow); }
        button.main-btn:hover { transform: translateY(-2px); box-shadow: 0 15px 25px -10px var(--primary-glow); }
        button.secondary-btn { background: var(--panel-bg); border: 1px solid var(--border-strong); color: var(--text-main); box-shadow: none; font-weight: 600; }
        button.secondary-btn:hover { background: var(--primary-trans); }

        @media (max-width: 600px) {
            .container { padding: 25px 20px; border-radius: 20px; }
            .btn-grid { grid-template-columns: 1fr; }
            #word-display { font-size: 1.3rem; height: 105px; gap: 6px 10px; }
            input.classic-input { font-size: 1.1rem; padding: 15px; }
        }
    </style>
</head>
<body>

    <div class="container" id="menu-container">
        <div class="menu-header">
            <h1>Typing Master Pro</h1>
            <p>Latihan Ketelitian Akademik & Kasual</p>
            <div class="best-all-time" id="best-all-time-display">🏆 Best of All Time: 0 KPM</div>
        </div>

        <div class="settings-panel">
            <div class="setting-group">
                <label>🎨 Tema:</label>
                <select id="theme-selector" onchange="changeTheme(this.value)">
                    <option value="slate">🌙 Slate (Default)</option>
                    <option value="kawaii">🌸 Kawaii Pink</option>
                    <option value="cyberpunk">🌃 Cyberpunk</option>
                    <option value="ocean">🌊 Deep Ocean</option>
                    <option value="matcha">🍵 Matcha Dark</option>
                    <option value="hacker">💻 Hacker Terminal</option>
                </select>
            </div>
            <div class="setting-group">
                <label>🔊 Suara:</label>
                <select id="sound-selector" onchange="changeSound(this.value)">
                    <option value="thock">🎹 Thock (Mekanikal)</option>
                    <option value="clicky">🖱️ Clicky (Blue Switch)</option>
                    <option value="bubble">🫧 Bubble Pop</option>
                    <option value="typewriter">📠 Typewriter</option>
                    <option value="off">🔇 Mati</option>
                </select>
            </div>
        </div>

        <div class="btn-grid">
            <button class="menu-btn" onclick="selectMode(1)">
                <strong>Mode 1: Kasual (60s)</strong>
                <span>Fokus kecepatan murni. Kata hubung & kata kerja.</span>
                <div class="mode-best-badge" id="best-mode-1">🏅 Rekor: 0 KPM</div>
            </button>
            <button class="menu-btn" onclick="selectMode(2)">
                <strong>Mode 2: Kosakata Baku KTI (60s)</strong>
                <span>Melatih ketelitian dengan bank kata baku PUEBI.</span>
                <div class="mode-best-badge" id="best-mode-2">🏅 Rekor: 0 KPM</div>
            </button>
            <button class="menu-btn" onclick="selectMode(3)">
                <strong>Mode 3: Kalimat KTI (60s)</strong>
                <span>Menyusun rentetan kalimat Karya Tulis Ilmiah.</span>
                <div class="mode-best-badge" id="best-mode-3">🏅 Rekor: 0 KPM</div>
            </button>
            <button class="menu-btn" onclick="selectMode(4)">
                <strong>Mode 4: Simulasi KTI (Endless)</strong>
                <span>Fokus penuh menyusun kalimat KTI tanpa waktu.</span>
                <div class="mode-best-badge" id="best-mode-4">🏅 Rekor: 0 KPM</div>
            </button>
            <button class="menu-btn switch-app-btn" onclick="window.location.href='game.html'">
                🚀 Pindah ke Mode Game (Typing Defender)
            </button>
        </div>
    </div>

    <div class="container hidden" id="theme-container">
        <div class="menu-header"><h1>Pilih Referensi Teks</h1></div>
        <div class="btn-grid" style="display:flex; flex-direction:column;">
            <button class="menu-btn" onclick="selectTheme('perkapalan')">
                <strong>🚢 Teknik Perkapalan</strong>
                <span>Hidrostatika, lines plan, CFD, stabilitas laut, dan mekanika fluida.</span>
            </button>
            <button class="menu-btn" onclick="selectTheme('komunikasi')">
                <strong>📝 Sintaksis & Ilmu Komunikasi</strong>
                <span>Syarat kalimat efektif, literasi digital, public relations, dan semiotika media.</span>
            </button>
            <button class="main-btn secondary-btn" style="margin-top: 10px;" onclick="returnToMenu()">Kembali ke Menu</button>
        </div>
    </div>

    <div class="container hidden" id="game-container">
        <div class="stats">
            <div id="time-display-wrapper"><span id="time-display-text">60</span></div>
            <div class="top-controls">
                <button class="control-btn" onclick="returnToMenu()">⬅️ Menu</button>
                <button class="control-btn" id="finish-btn" onclick="endClassicGame()">🛑 Selesai</button>
                <button class="control-btn" onclick="restartCurrentSession()">🔄</button>
            </div>
        </div>
        <div id="word-display"></div>
        <input type="text" id="word-input" class="classic-input" placeholder="Mulai ketik..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" inputmode="text">
    </div>

    <div class="container hidden" id="result-container">
        <div class="result-box">
            <h2 id="result-title">Selesai!</h2>
            <p class="wpm-score"><span id="wpm">0</span> KPM</p>
            <div class="stats-grid">
                <div><span class="text-muted">Akurasi</span> <span class="text-yellow" id="stat-1">0%</span></div>
                <div><span class="text-muted">Waktu</span> <span class="text-white" id="stat-2">0s</span></div>
                <div>Total Ketukan <span class="text-blue" id="stat-total-letters">0</span></div>
                <div>Kata Diselesaikan <span class="text-green" id="stat-words">0</span></div>
                <div>Huruf Salah <span class="text-red" id="stat-incorrect-letters">0</span></div>
            </div>
            <div class="wrong-words-box" id="wrong-words-box">
                <span class="wrong-words-title">Kata Salah / Terlewat</span>
                <span id="wrong-words-list">-</span>
            </div>
            <div class="btn-group">
                <button class="main-btn" onclick="restartCurrentSession()">Ulangi Latihan</button>
                <button class="main-btn secondary-btn" onclick="returnToMenu()">Menu Utama</button>
            </div>
        </div>
    </div>

    <script src="referensi.js"></script>

    <script>
        // === CORE CONFIG ===
        let currentMode = 1; let currentTheme = 'perkapalan'; let isPlaying = false;
        let time = 60; let elapsedSeconds = 0; let timerInterval; let currentWordIndex = 0; let wordEls = []; 
        let currentSound = 'thock'; let audioCtx;

        function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
        function loadPreferences() {
            let savedTheme = localStorage.getItem('typing_theme') || 'slate';
            let savedSound = localStorage.getItem('typing_sound') || 'thock';
            document.getElementById('theme-selector').value = savedTheme;
            document.getElementById('sound-selector').value = savedSound;
            changeTheme(savedTheme); currentSound = savedSound;
        }
        function changeTheme(themeName) {
            if (themeName === 'slate') document.documentElement.removeAttribute('data-theme');
            else document.documentElement.setAttribute('data-theme', themeName);
            localStorage.setItem('typing_theme', themeName);
        }
        function changeSound(soundName) { currentSound = soundName; localStorage.setItem('typing_sound', soundName); initAudio(); playTypingSound(); }
        function loadHighScores() {
            let bestAll = localStorage.getItem('bestKPM_all') || 0;
            document.getElementById('best-all-time-display').innerText = `🏆 Best of All Time: ${bestAll} KPM`;
            for(let i=1; i<=4; i++) {
                let badgeEl = document.getElementById(`best-mode-${i}`);
                if(badgeEl) badgeEl.innerText = `🏅 Rekor: ${localStorage.getItem(`bestKPM_mode${i}`) || 0} KPM`;
            }
        }
        function saveHighScore(mode, newKPM) {
            let cb = parseInt(localStorage.getItem(`bestKPM_mode${mode}`) || 0); let ca = parseInt(localStorage.getItem('bestKPM_all') || 0);
            if (newKPM > cb) localStorage.setItem(`bestKPM_mode${mode}`, newKPM);
            if (newKPM > ca) localStorage.setItem('bestKPM_all', newKPM);
            loadHighScores(); 
        }
        window.onload = function() { loadPreferences(); loadHighScores(); };

        function playTypingSound() {
            if (currentSound === 'off' || !audioCtx) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            if (currentSound === 'thock') { osc.type = 'sine'; osc.frequency.setValueAtTime(500, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.03); gain.gain.setValueAtTime(0.4, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.03); } 
            else if (currentSound === 'clicky') { osc.type = 'square'; osc.frequency.setValueAtTime(800, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(300, audioCtx.currentTime + 0.02); gain.gain.setValueAtTime(0.15, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.02); const filter = audioCtx.createBiquadFilter(); filter.type = 'highpass'; filter.frequency.value = 1000; osc.connect(filter); filter.connect(gain); } 
            else if (currentSound === 'bubble') { osc.type = 'sine'; osc.frequency.setValueAtTime(300, audioCtx.currentTime); osc.frequency.linearRampToValueAtTime(600, audioCtx.currentTime + 0.04); gain.gain.setValueAtTime(0.3, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.04); } 
            else if (currentSound === 'typewriter') { osc.type = 'triangle'; osc.frequency.setValueAtTime(1200, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.05); gain.gain.setValueAtTime(0.3, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05); }
            if (currentSound !== 'clicky') osc.connect(gain);
            gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 0.05);
        }

        function shuffleArray(array) { let s = array.slice(); for (let i = s.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [s[i], s[j]] = [s[j], s[i]]; } return s; }

        function returnToMenu() { clearInterval(timerInterval); isPlaying = false; document.getElementById('theme-container').classList.add('hidden'); document.getElementById('game-container').classList.add('hidden'); document.getElementById('result-container').classList.add('hidden'); document.getElementById('menu-container').classList.remove('hidden'); loadHighScores(); }
        function restartCurrentSession() { selectMode(currentMode); if(currentMode===3||currentMode===4) selectTheme(currentTheme); }
        function selectMode(mode) { initAudio(); currentMode = mode; document.getElementById('menu-container').classList.add('hidden'); if (mode === 1 || mode === 2) { document.getElementById('game-container').classList.remove('hidden'); resetClassicSetup(); } else { document.getElementById('theme-container').classList.remove('hidden'); } }
        function selectTheme(theme) { initAudio(); currentTheme = theme; document.getElementById('theme-container').classList.add('hidden'); document.getElementById('game-container').classList.remove('hidden'); resetClassicSetup(); }

        const wordInput = document.getElementById('word-input');
        function resetClassicSetup() {
            const display = document.getElementById('word-display'); display.innerHTML = ''; wordInput.value = ''; wordInput.disabled = false;
            currentWordIndex = 0; display.scrollTop = 0; isPlaying = false; elapsedSeconds = 0; clearInterval(timerInterval);
            if (currentMode === 4) { document.getElementById('time-display-wrapper').innerHTML = `<span style="font-size:1.1rem; color:var(--text-muted);">Tak Terbatas</span>`; document.getElementById('finish-btn').style.display = 'flex'; } 
            else { time = 60; document.getElementById('time-display-wrapper').innerHTML = `Waktu: <span id="time-display-text">60</span>s`; document.getElementById('finish-btn').style.display = 'none'; }

            let arr = [];
            if (currentMode === 1) { let r = []; while(r.length < 300) r = r.concat(shuffleArray(dailyWords)); arr = r.slice(0, 300); } 
            else if (currentMode === 2) { let r = []; while(r.length < 300) r = r.concat(shuffleArray(utbkWords)); arr = r.slice(0, 300); } 
            else { let src = (currentTheme === 'perkapalan') ? ktiPerkapalan : ktiKomunikasi; let r = []; let limit = (currentMode === 4) ? 100 : 40; while(r.length < limit) r = r.concat(shuffleArray(src)); arr = r.slice(0, limit).join(" ").trim().split(" "); }

            arr.forEach(word => {
                const w = document.createElement('span'); w.classList.add('word');
                word.split('').forEach(char => { const c = document.createElement('span'); c.classList.add('letter', 'original'); c.innerText = char; w.appendChild(c); });
                display.appendChild(w);
            });
            wordEls = document.querySelectorAll('.word'); if(wordEls.length > 0) wordEls[0].classList.add('active'); wordInput.focus();
        }

        wordInput.addEventListener('keydown', (e) => {
            if (e.key.length === 1 || e.key === 'Backspace') playTypingSound();
            if (e.code === 'Space') { e.preventDefault(); if (wordInput.value.trim().length === 0) return; if (!isPlaying) { isPlaying=true; timerInterval = setInterval(updateTime, 1000);} processWord(wordInput.value.trim()); }
            if (e.key === 'Escape' && isPlaying && currentMode === 4) { e.preventDefault(); endClassicGame(); }
        });

        wordInput.addEventListener('input', (e) => {
            if (!isPlaying && wordInput.value.length > 0) { isPlaying=true; timerInterval = setInterval(updateTime, 1000);}
            if (wordInput.value.endsWith(' ')) { if (wordInput.value.trim().length > 0) processWord(wordInput.value.trim()); else wordInput.value = ''; return; }
            const el = wordEls[currentWordIndex]; if (!el) return;
            el.querySelectorAll('.letter.extra').forEach(e => e.remove());
            const orig = el.querySelectorAll('.letter.original'); const typ = wordInput.value.split('');
            orig.forEach((c, i) => { c.classList.remove('correct', 'incorrect'); if (typ[i] != null) { if (typ[i] === c.innerText) c.classList.add('correct'); else c.classList.add('incorrect'); } });
            if (typ.length > orig.length) { for (let i = orig.length; i < typ.length; i++) { const ex = document.createElement('span'); ex.classList.add('letter', 'incorrect', 'extra'); ex.innerText = typ[i]; el.appendChild(ex); } }
        });

        function processWord(txt) {
            const el = wordEls[currentWordIndex]; if (!el) return;
            el.querySelectorAll('.letter.original').forEach((c, i) => { if (i >= txt.length) c.classList.add('incorrect'); });
            el.classList.remove('active'); currentWordIndex++;
            if (currentWordIndex >= wordEls.length) { endClassicGame(); return; }
            const nx = wordEls[currentWordIndex]; nx.classList.add('active'); wordInput.value = ''; 
            if (nx.offsetTop > el.offsetTop) document.getElementById('word-display').scrollTop += (nx.offsetTop - el.offsetTop);
        }
        function updateTime() { elapsedSeconds++; if (currentMode !== 4) { time--; document.getElementById('time-display-text').innerText = time; if (time <= 0) endClassicGame(); } }

        function endClassicGame() {
            isPlaying = false; clearInterval(timerInterval); wordInput.disabled = true;
            const tCor = document.querySelectorAll('.letter.correct').length; const tInc = document.querySelectorAll('.letter.incorrect').length;
            let cWords = 0; let wArr = [];
            for (let i = 0; i <= currentWordIndex; i++) {
                if (i >= wordEls.length) break;
                const el = wordEls[i]; const cor = el.querySelectorAll('.letter.correct').length; const orig = el.querySelectorAll('.letter.original').length;
                if (i === currentWordIndex && wordInput.value.trim().length === 0) continue; 
                if (el.querySelector('.letter.incorrect') !== null || cor < orig) { let txt = ""; el.querySelectorAll('.letter').forEach(l => txt += l.innerText); wArr.push(txt); } else cWords++;
            }
            let mins = elapsedSeconds / 60; if (mins === 0) mins = 1; 
            let keys = tCor + tInc + currentWordIndex;
            let kpm = Math.round((keys / 5) / mins - (wArr.length / mins)); if (kpm < 0) kpm = 0;
            let acc = keys > 0 ? Math.round(((tCor + currentWordIndex) / keys) * 100) : 0; if (acc > 100) acc = 100;
            saveHighScore(currentMode, kpm);
            
            document.getElementById('wpm').innerText = kpm; document.getElementById('stat-total-letters').innerText = keys; document.getElementById('stat-words').innerText = cWords;
            document.getElementById('stat-1').innerText = acc + "%"; document.getElementById('stat-2').innerText = elapsedSeconds+"s";
            document.getElementById('stat-incorrect-letters').innerText = tInc;
            const list = document.getElementById('wrong-words-list');
            if (wArr.length > 0) list.innerText = [...new Set(wArr)].join(", "); else list.innerText = "Sempurna!";
            
            document.getElementById('game-container').classList.add('hidden'); document.getElementById('result-container').classList.remove('hidden');
        }
    </script>
</body>
</html>
